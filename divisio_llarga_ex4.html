<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divisió de Polinomis — Exercici 4</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3352;
  --accent:#6c8cff; --accent2:#a78bfa; --green:#34d399; --red:#f87171;
  --amber:#fbbf24; --text:#e8eaf6; --muted:#8b92b8;
  --cd:#93c5fd; --cq:#6ee7b7; --cp:#fde68a; --cr:#fca5a5; --cn:#f9a8d4;
  --mono:'JetBrains Mono',monospace; --sans:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 4rem;}

.header{text-align:center;margin-bottom:1.4rem;animation:fadeDown .5s ease;}
.badge{display:inline-block;font-size:.68rem;font-weight:600;letter-spacing:.15em;
  text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);
  border-radius:20px;padding:.22rem .75rem;margin-bottom:.55rem;}
.header h1{font-size:clamp(1.25rem,4vw,1.75rem);font-weight:700;margin-bottom:.2rem;}
.header p{font-size:.8rem;color:var(--muted);}

/* SELECTOR */
.sel-wrap{width:100%;max-width:780px;margin-bottom:1.1rem;animation:fadeUp .4s ease .1s both;}
.sel-lbl{font-size:.7rem;color:var(--muted);margin-bottom:.45rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.sel-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.45rem;}
.sel-btn{background:var(--surface);border:1px solid var(--border);border-radius:11px;
  color:var(--muted);font-family:var(--mono);font-size:.82rem;font-weight:600;
  padding:.55rem .3rem;cursor:pointer;transition:all .2s;text-align:center;}
.sel-btn:hover{border-color:var(--accent);color:var(--accent);}
.sel-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.sel-btn.done{border-color:var(--green);color:var(--green);}
.sel-btn.done.active{background:var(--green);color:#0f1117;}

/* ENUNCIAT */
.enun{width:100%;max-width:780px;background:var(--surface);border:1px solid var(--border);
  border-radius:13px;padding:.9rem 1.4rem;margin-bottom:.9rem;
  display:flex;align-items:flex-start;gap:1.2rem;flex-wrap:wrap;animation:fadeUp .4s ease .15s both;}
.enun-part .lbl{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem;}
.enun-part .expr{font-family:var(--mono);font-size:.98rem;font-weight:600;}
.expr.ec{color:var(--cd);} .expr.ed{color:var(--accent2);}
.enun-sep{font-size:1.4rem;color:var(--border);align-self:center;}
.nota-warn{width:100%;font-size:.76rem;color:var(--amber);margin-top:.3rem;}

/* PROGRESS */
.prog-wrap{width:100%;max-width:780px;margin-bottom:.9rem;animation:fadeUp .4s ease .18s both;}
.prog-steps{display:flex;gap:.32rem;margin-bottom:.28rem;}
.prog-dot{height:4px;flex:1;border-radius:2px;background:var(--border);transition:background .3s;}
.prog-dot.done{background:var(--green);} .prog-dot.active{background:var(--accent);}
.prog-lbl{font-size:.7rem;color:var(--muted);text-align:right;}

/* MAIN CARD */
.card{width:100%;max-width:780px;background:var(--surface);border:1px solid var(--border);
  border-radius:18px;overflow:hidden;animation:fadeUp .4s ease .2s both;}
.step-hdr{display:flex;align-items:center;gap:.85rem;padding:1rem 1.5rem;
  background:var(--surface2);border-bottom:1px solid var(--border);}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--accent);
  color:#fff;font-weight:700;font-size:.82rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-title{font-weight:600;font-size:.92rem;}
.step-desc{font-size:.76rem;color:var(--muted);margin-top:.08rem;}

/* VISUALITZACIÓ DIVISIÓ */
.div-vis{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);overflow-x:auto;}
.div-layout{display:grid;grid-template-columns:auto 2px auto;min-width:300px;align-items:start;gap:0;}
.div-left{padding-right:1.2rem;}
.div-sep{background:var(--muted);margin:0 .5rem;align-self:stretch;}
.div-right{padding-left:1.2rem;}
.poly-row{display:flex;align-items:baseline;gap:.28rem;min-height:1.9rem;margin-bottom:.1rem;flex-wrap:wrap;}
.trm{font-family:var(--mono);font-size:.95rem;font-weight:600;padding:.06rem .15rem;border-radius:3px;transition:all .3s;white-space:nowrap;}
.trm.dim{color:var(--muted);font-weight:400;}
.trm.hd{color:var(--cd);}   /* dividend */
.trm.hq{color:var(--cq);}   /* quocient */
.trm.hp{color:var(--cp);}   /* producte */
.trm.hn{color:var(--cn);}   /* negatiu (signe canviat) */
.trm.hr{color:var(--cr);}   /* resta */
.div-line{height:2px;background:var(--muted);margin:.35rem 0;border-radius:1px;}
.sub-row{display:flex;align-items:baseline;gap:.28rem;min-height:1.7rem;
  color:var(--muted);font-family:var(--mono);font-size:.88rem;}

/* INPUT AREA */
.inp-area{padding:1.2rem 1.5rem;}
.iq{font-size:.86rem;color:var(--text);margin-bottom:.85rem;line-height:1.55;}
.iq strong{color:var(--accent);}
.inp-row{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap;margin-bottom:.85rem;}
.inp-prefix{font-family:var(--mono);font-size:.92rem;color:var(--muted);}
.terms-row{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;margin-bottom:.85rem;}
.tiw{display:flex;align-items:center;gap:.28rem;}
.tiw .lbl2{font-size:.7rem;color:var(--muted);white-space:nowrap;}

input[type=text]{font-family:var(--mono);font-size:.92rem;font-weight:600;
  background:var(--bg);border:2px solid var(--border);border-radius:9px;
  color:var(--text);padding:.4rem .7rem;outline:none;text-align:center;
  transition:border-color .2s,box-shadow .2s;width:110px;}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,140,255,.14);}
input.ok{border-color:var(--green)!important;}
input.error{border-color:var(--red)!important;animation:shake .3s ease;}

.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:.4rem;}
.btn{font-family:var(--sans);font-size:.8rem;font-weight:600;padding:.48rem 1.1rem;
  border-radius:9px;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.3rem;}
.btn-p{background:var(--accent);color:#fff;} .btn-p:hover{background:#8aa4ff;transform:translateY(-1px);}
.btn-h{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-h:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-n{background:var(--green);color:#0f1117;} .btn-n:hover{background:#6ee7b7;transform:translateY(-1px);}

.fb{border-radius:10px;padding:.75rem 1rem;margin-top:.85rem;font-size:.82rem;
  line-height:1.6;display:none;animation:fadeUp .3s ease;}
.fb.ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:#6ee7b7;}
.fb.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#fca5a5;}
.fb.hint{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);color:#c4b5fd;}

/* CHAT */
.chat-sec{border-top:1px solid var(--border);padding:.9rem 1.5rem;}
.chat-tog{display:flex;align-items:center;gap:.45rem;font-size:.76rem;color:var(--muted);
  cursor:pointer;background:none;border:none;font-family:var(--sans);transition:color .2s;}
.chat-tog:hover{color:var(--accent2);}
.chat-box{display:none;margin-top:.8rem;flex-direction:column;gap:.45rem;}
.chat-box.open{display:flex;animation:fadeUp .3s ease;}
.chat-ir{display:flex;gap:.5rem;}
.chat-inp{flex:1;font-family:var(--sans);font-size:.8rem;background:var(--bg);
  border:1px solid var(--border);border-radius:9px;color:var(--text);padding:.52rem .85rem;outline:none;transition:border-color .2s;}
.chat-inp:focus{border-color:var(--accent2);}
.chat-send{background:var(--accent2);color:#fff;border:none;border-radius:9px;padding:.52rem .85rem;cursor:pointer;font-size:.88rem;}
.chat-msgs{display:flex;flex-direction:column;gap:.38rem;max-height:170px;overflow-y:auto;}
.msg{border-radius:9px;padding:.5rem .8rem;font-size:.78rem;line-height:1.5;animation:fadeUp .2s ease;}
.msg.user{background:var(--surface2);color:var(--muted);align-self:flex-end;max-width:85%;}
.msg.tutor{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);color:var(--text);}

/* FINAL */
.final{display:none;width:100%;max-width:780px;margin-top:1.1rem;background:var(--surface);
  border:1px solid var(--green);border-radius:17px;padding:1.6rem;text-align:center;}
.final.show{display:block;animation:fadeUp .5s ease;}
.final-icon{font-size:2.3rem;margin-bottom:.7rem;}
.final-title{font-size:1.2rem;font-weight:700;color:var(--green);margin-bottom:.35rem;}
.final-txt{color:var(--muted);font-size:.82rem;margin-bottom:1.1rem;line-height:1.65;}
.res-box{background:var(--bg);border:1px solid var(--border);border-radius:9px;
  padding:.9rem 1.1rem;display:inline-block;text-align:left;font-family:var(--mono);}
.rl{font-size:.88rem;margin-bottom:.38rem;} .rl:last-child{margin-bottom:0;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ldots span{animation:pulse 1.1s ease infinite;}
.ldots span:nth-child(2){animation-delay:.2s}.ldots span:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>

<div class="header">
  <div class="badge">3r ESO · Matemàtiques</div>
  <h1>Divisió de Polinomis</h1>
  <p>Exercici 4 — Mètode estàndard (divisió llarga) · Pas a pas</p>
</div>

<div class="sel-wrap">
  <div class="sel-lbl">Escull un apartat</div>
  <div class="sel-grid" id="selGrid"></div>
</div>

<div class="enun" id="enun"></div>

<div class="prog-wrap">
  <div class="prog-steps" id="progSteps"></div>
  <div class="prog-lbl"   id="progLbl"></div>
</div>

<div class="card" id="mainCard">
  <div class="step-hdr">
    <div class="step-num" id="stepNum">1</div>
    <div><div class="step-title" id="stepTitle"></div><div class="step-desc" id="stepDesc"></div></div>
  </div>
  <div class="div-vis" id="divVis"></div>
  <div class="inp-area" id="inpArea"></div>
  <div class="chat-sec">
    <button class="chat-tog" onclick="toggleChat()">💬 No sé com seguir... pregunta al tutor</button>
    <div class="chat-box" id="chatBox">
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-ir">
        <input class="chat-inp" id="chatInp" placeholder="Escriu la teva pregunta..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">→</button>
      </div>
    </div>
  </div>
</div>

<div class="final" id="finalPanel">
  <div class="final-icon">🎉</div>
  <div class="final-title" id="finalTitle"></div>
  <div class="final-txt">Has completat la divisió! Recorda: Dividend = Divisor × Quocient + Resta</div>
  <div class="res-box" id="resBox"></div><br>
  <button class="btn btn-n" style="margin-top:1rem;display:inline-flex" onclick="resetEx()">→ Fes un altre apartat</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DADES — tots els passos pre-calculats
// ═══════════════════════════════════════════════════════════════
const EX = [
  {
    label:"a",
    dividend:"6x³ − x² − 25x + 15",
    divisor:"2x² + 3x − 4",
    quocient:"3x − 5",
    resta:"2x − 5",
    nota: null,
    passos:[
      {
        termeQ:"3x",
        producte:"6x³ + 9x² − 12x",
        signe_canviat:"−6x³ − 9x² + 12x",
        residu:"−10x² − 13x + 15",
        // per validació
        tQ_norm:"3x", prod_norm:["6x3","9x2","-12x"], res_norm:["-10x2","-13x","15"]
      },
      {
        termeQ:"−5",
        producte:"−10x² − 15x + 20",
        signe_canviat:"+10x² + 15x − 20",
        residu:"2x − 5",
        tQ_norm:"-5", prod_norm:["-10x2","-15x","20"], res_norm:["2x","-5"]
      }
    ],
    tutorCtx:"Divisió (6x³−x²−25x+15)÷(2x²+3x−4). Mètode estàndard. Q=3x−5, R=2x−5."
  },
  {
    label:"b",
    dividend:"x⁴ + 5x³ − 2x² + 17x − 18",
    divisor:"x² + 4",
    quocient:"x² + 5x − 6",
    resta:"−3x + 6",
    nota:"⚠️ El divisor x²+4 no té terme en x → coeficient 0 (però no cal escriure'l)",
    passos:[
      {
        termeQ:"x²",
        producte:"x⁴ + 4x²",
        signe_canviat:"−x⁴ − 4x²",
        residu:"5x³ − 6x² + 17x − 18",
        tQ_norm:"x2", prod_norm:["x4","4x2"], res_norm:["5x3","-6x2","17x","-18"]
      },
      {
        termeQ:"5x",
        producte:"5x³ + 20x",
        signe_canviat:"−5x³ − 20x",
        residu:"−6x² − 3x − 18",
        tQ_norm:"5x", prod_norm:["5x3","20x"], res_norm:["-6x2","-3x","-18"]
      },
      {
        termeQ:"−6",
        producte:"−6x² − 24",
        signe_canviat:"+6x² + 24",
        residu:"−3x + 6",
        tQ_norm:"-6", prod_norm:["-6x2","-24"], res_norm:["-3x","6"]
      }
    ],
    tutorCtx:"Divisió (x⁴+5x³−2x²+17x−18)÷(x²+4). El divisor no té terme en x. Q=x²+5x−6, R=−3x+6."
  },
  {
    label:"c",
    dividend:"3x³ − 2x² + x + 18",
    divisor:"x + 4",
    quocient:"3x² − 14x + 57",
    resta:"−210",
    nota: null,
    passos:[
      {
        termeQ:"3x²",
        producte:"3x³ + 12x²",
        signe_canviat:"−3x³ − 12x²",
        residu:"−14x² + x + 18",
        tQ_norm:"3x2", prod_norm:["3x3","12x2"], res_norm:["-14x2","x","18"]
      },
      {
        termeQ:"−14x",
        producte:"−14x² − 56x",
        signe_canviat:"+14x² + 56x",
        residu:"57x + 18",
        tQ_norm:"-14x", prod_norm:["-14x2","-56x"], res_norm:["57x","18"]
      },
      {
        termeQ:"57",
        producte:"57x + 228",
        signe_canviat:"−57x − 228",
        residu:"−210",
        tQ_norm:"57", prod_norm:["57x","228"], res_norm:["-210"]
      }
    ],
    tutorCtx:"Divisió (3x³−2x²+x+18)÷(x+4). Q=3x²−14x+57, R=−210."
  },
  {
    label:"d",
    dividend:"x⁴ − 3x²",
    divisor:"x² − 4",
    quocient:"x² + 1",
    resta:"4",
    nota:"⚠️ El dividend no té termes en x³, x ni independent → coeficients 0",
    passos:[
      {
        termeQ:"x²",
        producte:"x⁴ − 4x²",
        signe_canviat:"−x⁴ + 4x²",
        residu:"x²",
        tQ_norm:"x2", prod_norm:["x4","-4x2"], res_norm:["x2"]
      },
      {
        termeQ:"1",
        producte:"x² − 4",
        signe_canviat:"−x² + 4",
        residu:"4",
        tQ_norm:"1", prod_norm:["x2","-4"], res_norm:["4"]
      }
    ],
    tutorCtx:"Divisió (x⁴−3x²)÷(x²−4). El dividend no té x³, x ni terme ind. Q=x²+1, R=4."
  },
  {
    label:"e",
    dividend:"x⁴ − 2x + 8",
    divisor:"x² + x",
    quocient:"x² − x + 1",
    resta:"−3x + 8",
    nota:"⚠️ El dividend no té x³ ni x² → coeficients 0",
    passos:[
      {
        termeQ:"x²",
        producte:"x⁴ + x³",
        signe_canviat:"−x⁴ − x³",
        residu:"−x³ − 2x + 8",
        tQ_norm:"x2", prod_norm:["x4","x3"], res_norm:["-x3","-2x","8"]
      },
      {
        termeQ:"−x",
        producte:"−x³ − x²",
        signe_canviat:"+x³ + x²",
        residu:"x² − 2x + 8",
        tQ_norm:"-x", prod_norm:["-x3","-x2"], res_norm:["x2","-2x","8"]
      },
      {
        termeQ:"1",
        producte:"x² + x",
        signe_canviat:"−x² − x",
        residu:"−3x + 8",
        tQ_norm:"1", prod_norm:["x2","x"], res_norm:["-3x","8"]
      }
    ],
    tutorCtx:"Divisió (x⁴−2x+8)÷(x²+x). El dividend no té x³ ni x². Q=x²−x+1, R=−3x+8."
  },
  {
    label:"f",
    dividend:"3x³ − x + 5",
    divisor:"2x + 1",
    quocient:"3/2 x² − 3/4 x − 1/8",
    resta:"41/8",
    nota:"⚠️ El divisor té coeficient 2 → el quocient tindrà fraccions. El dividend no té x².",
    passos:[
      {
        termeQ:"3/2 x²",
        producte:"3x³ + 3/2 x²",
        signe_canviat:"−3x³ − 3/2 x²",
        residu:"−3/2 x² − x + 5",
        tQ_norm:"3/2x2", prod_norm:["3x3","3/2x2"], res_norm:["-3/2x2","-x","5"]
      },
      {
        termeQ:"−3/4 x",
        producte:"−3/2 x² − 3/4 x",
        signe_canviat:"+3/2 x² + 3/4 x",
        residu:"−1/4 x + 5",
        tQ_norm:"-3/4x", prod_norm:["-3/2x2","-3/4x"], res_norm:["-1/4x","5"]
      },
      {
        termeQ:"−1/8",
        producte:"−1/4 x − 1/8",
        signe_canviat:"+1/4 x + 1/8",
        residu:"41/8",
        tQ_norm:"-1/8", prod_norm:["-1/4x","-1/8"], res_norm:["41/8"]
      }
    ],
    tutorCtx:"Divisió (3x³−x+5)÷(2x+1). Coefs fraccionaris! Q=3/2 x²−3/4 x−1/8, R=41/8."
  }
];

// ═══════════════════════════════════════════════════════════════
// ESTAT
// ═══════════════════════════════════════════════════════════════
let ex=null, step=1, totalSteps=0, done={}, chatOpen=false, hints={};

// ═══════════════════════════════════════════════════════════════
// SELECTOR
// ═══════════════════════════════════════════════════════════════
function initSel(){
  const g=document.getElementById('selGrid'); g.innerHTML='';
  EX.forEach(e=>{
    const b=document.createElement('button');
    b.className='sel-btn'+(done[e.label]?' done':'');
    b.id='sb-'+e.label; b.textContent=e.label+')';
    b.onclick=()=>selEx(e.label); g.appendChild(b);
  });
}
function selEx(label){
  ex=EX.find(e=>e.label===label);
  document.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sb-'+label).classList.add('active');
  step=1; hints={}; chatOpen=false;
  document.getElementById('chatBox').classList.remove('open');
  document.getElementById('chatMsgs').innerHTML='';
  document.getElementById('finalPanel').classList.remove('show');
  document.getElementById('mainCard').style.display='';
  totalSteps = 1 + ex.passos.length * 3 + 1;
  // passos: [1=terme líder] + per cada pas [A=terme Q, B=producte, C=residu] + [final=llegir]
  // Simplificat: 1 intro + passos*3 + 1 final
  totalSteps = 1 + ex.passos.length * 3 + 1;
  renderEnun(); updProg(); renderStep();
}
function resetEx(){
  document.getElementById('finalPanel').classList.remove('show');
  document.getElementById('mainCard').style.display='';
  step=1; hints={}; renderStep();
}

// ═══════════════════════════════════════════════════════════════
// ENUNCIAT
// ═══════════════════════════════════════════════════════════════
function renderEnun(){
  let h=`<div class="enun-part"><div class="lbl">Dividend</div><div class="expr ec">${ex.dividend}</div></div>
  <div class="enun-sep">÷</div>
  <div class="enun-part"><div class="lbl">Divisor</div><div class="expr ed">${ex.divisor}</div></div>`;
  if(ex.nota) h+=`<div class="nota-warn">${ex.nota}</div>`;
  document.getElementById('enun').innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// VISUALITZACIÓ DIVISIÓ
// ═══════════════════════════════════════════════════════════════
function trm(txt,cls=''){return`<span class="trm ${cls}">${txt}</span>`;}

function renderDiv(revealPas){
  // revealPas: quants passos complets es mostren (-1 = tot)
  const left=document.getElementById('divVis');
  let lh='', rh='';

  // Esquerra: dividend + subtraccions progressives
  lh+=`<div class="poly-row">${trm(ex.dividend,'hd')}</div>`;

  ex.passos.forEach((p,i)=>{
    if(revealPas>i || revealPas===-1){
      // Mostrar el producte amb signe canviat
      lh+=`<div class="sub-row">${trm('−(','dim')}${trm(p.producte,'hp')}${trm(')','dim')}</div>`;
      lh+=`<div class="div-line"></div>`;
      // Residu
      const isLast=(i===ex.passos.length-1);
      lh+=`<div class="poly-row">${trm(p.residu, isLast?'hr':'hd')}</div>`;
    }
  });

  // Dreta: divisor + quocient progressiu
  rh+=`<div class="poly-row">${trm(ex.divisor,'dim')}</div>`;
  rh+=`<div class="div-line" style="margin:.18rem 0 .38rem"></div>`;

  let qTerms='';
  ex.passos.forEach((p,i)=>{
    if(revealPas>i || revealPas===-1) qTerms+=trm((i===0?'':' ') + (i>0&&!p.termeQ.startsWith('−')?' + ':' ') + p.termeQ,'hq');
  });
  if(qTerms) rh+=`<div class="poly-row">${qTerms}</div>`;

  left.innerHTML=`<div class="div-layout">
    <div class="div-left">${lh}</div>
    <div class="div-sep"></div>
    <div class="div-right">${rh}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// LÒGICA DELS PASSOS
// ═══════════════════════════════════════════════════════════════
// Estructura dels passos:
// step 1 → introductori: quin és el terme líder del dividend i del divisor?
// step 2,5,8,... (3i-1) → terme del quocient
// step 3,6,9,... (3i)   → producte (3 termes)
// step 4,7,10,... (3i+1)→ residu
// últim step → llegir resultat final

function getPasIdx(){ return Math.floor((step-2)/3); }  // 0-based
function getSubStep(){ return (step-2)%3; }             // 0=termeQ, 1=prod, 2=residu

function updProg(){
  const w=document.getElementById('progSteps'); w.innerHTML='';
  for(let i=1;i<=totalSteps;i++){
    const d=document.createElement('div');
    d.className='prog-dot'+(i<step?' done':i===step?' active':'');
    w.appendChild(d);
  }
  document.getElementById('progLbl').textContent=`Pas ${step} de ${totalSteps}`;
}

function setHdr(title,desc){
  document.getElementById('stepNum').textContent=step;
  document.getElementById('stepTitle').textContent=title;
  document.getElementById('stepDesc').textContent=desc;
}

function renderStep(){
  document.getElementById('chatBox').classList.remove('open');
  chatOpen=false;
  document.getElementById('stepNum').textContent=step;

  if(step===1){
    // Intro: terme líder
    renderDiv(-2); // mostra res
    setHdr("Identifiquem els termes líders","Dividim el terme de grau màxim del dividend entre el de grau màxim del divisor");
    const parts=ex.dividend.split('−')[0].split('+')[0].trim();
    const divParts=ex.divisor.split(' ')[0].trim();
    document.getElementById('inpArea').innerHTML=`
      <div class="iq">Primer pas del mètode estàndard: <strong>dividim els termes líders</strong>.<br>
      El terme líder del dividend és <strong>${parts}</strong> i el del divisor és <strong>${divParts}</strong>.<br>
      Quant és el primer terme del quocient?</div>
      <div class="inp-row">
        <span class="inp-prefix">Primer terme Q(x) =</span>
        <input type="text" id="inp_s1" placeholder="ex: 3x">
      </div>
      <div class="btn-row">
        <button class="btn btn-p" onclick="checkS1()">✓ Comprovar</button>
        <button class="btn btn-h" onclick="showHint()">💡 Pista</button>
      </div>
      <div class="fb" id="fb_s1"></div>`;
    document.getElementById('inp_s1').focus();

  } else if(step===totalSteps){
    // Final: llegir resultat
    renderDiv(ex.passos.length);
    setHdr("Llegim el resultat final","La taula ja és completa. Escriu el quocient i la resta.");
    document.getElementById('inpArea').innerHTML=`
      <div class="iq">La divisió és completa! Llegint la taula:<br>
      El <strong>quocient Q(x)</strong> és la suma de tots els termes que has obtingut a la dreta.<br>
      La <strong>resta R(x)</strong> és l'últim residu (sota l'última línia de la part esquerra).</div>
      <div class="inp-row" style="flex-direction:column;align-items:flex-start;gap:.55rem">
        <div style="display:flex;align-items:center;gap:.65rem">
          <span class="inp-prefix">Q(x) =</span>
          <input type="text" id="inp_qf" placeholder="${ex.quocient.length>12?'escriu el quocient':ex.quocient}" style="width:260px;text-align:left">
        </div>
        <div style="display:flex;align-items:center;gap:.65rem">
          <span class="inp-prefix">R(x) =</span>
          <input type="text" id="inp_rf" placeholder="${ex.resta}" style="width:200px;text-align:left">
        </div>
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin:.35rem 0 .75rem">Pots usar ^ per als exponents i / per a fraccions</div>
      <div class="btn-row">
        <button class="btn btn-p" onclick="checkFinal()">✓ Comprovar</button>
        <button class="btn btn-h" onclick="showHint()">💡 Pista</button>
      </div>
      <div class="fb" id="fb_sf"></div>`;

  } else {
    // Passos intermedis
    const pi = getPasIdx();
    const ss = getSubStep();
    const pas = ex.passos[pi];

    renderDiv(pi);

    if(ss===0){
      // Terme del quocient
      const divParts = ex.passos[pi===0?0:pi-1] ? (pi===0?ex.dividend.split(' ')[0]:ex.passos[pi-1].residu.split(' ')[0]) : ex.dividend.split(' ')[0];
      const residuActual = pi===0 ? ex.dividend : ex.passos[pi-1].residu;
      setHdr(`Pas ${pi+1} — Terme del quocient`,"Divideix el terme líder del residu entre el terme líder del divisor");
      document.getElementById('inpArea').innerHTML=`
        <div class="iq">Ara el "dividend parcial" és <strong>${residuActual}</strong>.<br>
        Divideix el seu terme líder entre el terme líder del divisor (<strong>${ex.divisor.split(' ')[0]}</strong>).<br>
        Quin és el <strong>terme del quocient</strong> d'aquest pas?</div>
        <div class="inp-row">
          <span class="inp-prefix">Terme Q =</span>
          <input type="text" id="inp_tq${pi}" placeholder="ex: ${pas.termeQ}">
        </div>
        <div class="btn-row">
          <button class="btn btn-p" onclick="checkTQ(${pi})">✓ Comprovar</button>
          <button class="btn btn-h" onclick="showHint()">💡 Pista</button>
        </div>
        <div class="fb" id="fb_tq${pi}"></div>`;
      document.getElementById(`inp_tq${pi}`).focus();

    } else if(ss===1){
      // Producte
      setHdr(`Pas ${pi+1} — Multiplica pel divisor`,"Multiplica el terme obtingut per tot el divisor");
      const nTermsDivisor = ex.divisor.split(/[+−]/).filter(t=>t.trim()).length;
      // Generar inputs per a cada terme del producte
      let termsHTML='';
      pas.prod_norm.forEach((pn,j)=>{
        termsHTML+=`<div class="tiw">
          <span class="lbl2">${j===0?pas.termeQ+' × '+ex.divisor.split(' ')[0]+'... =':`terme ${j+1}:`}</span>
          <input type="text" id="inp_pr${pi}_${j}" placeholder="?">
        </div>`;
        if(j<pas.prod_norm.length-1) termsHTML+=`<span style="color:var(--muted);font-family:var(--mono)"> + </span>`;
      });
      document.getElementById('inpArea').innerHTML=`
        <div class="iq">Multiplica <strong>${pas.termeQ}</strong> per cada terme del divisor <strong>(${ex.divisor})</strong>.<br>
        Escriu cada terme del producte (posa el signe canviat ja preparat per restar-ho):</div>
        <div class="terms-row">${termsHTML}</div>
        <div class="btn-row">
          <button class="btn btn-p" onclick="checkProd(${pi})">✓ Comprovar</button>
          <button class="btn btn-h" onclick="showHint()">💡 Pista</button>
        </div>
        <div class="fb" id="fb_pr${pi}"></div>`;

    } else {
      // Residu
      setHdr(`Pas ${pi+1} — Calcula el residu`,"Posa el producte amb signe canviat sota el dividend i suma columna a columna");
      const residuAnterior = pi===0 ? ex.dividend : ex.passos[pi-1].residu;
      document.getElementById('inpArea').innerHTML=`
        <div class="iq">Amb signe canviat: <strong>${pas.signe_canviat}</strong><br>
        Suma columna a columna amb <strong>${residuAnterior}</strong>.<br>
        Quin és el <strong>residu</strong> resultant?</div>
        <div class="inp-row">
          <span class="inp-prefix">Residu =</span>
          <input type="text" id="inp_rs${pi}" placeholder="ex: ${pas.residu}" style="width:220px;text-align:left">
        </div>
        <div style="font-size:.72rem;color:var(--muted);margin-bottom:.75rem">Escriu el polinomi complet, ex: −10x²−13x+15</div>
        <div class="btn-row">
          <button class="btn btn-p" onclick="checkRes(${pi})">✓ Comprovar</button>
          <button class="btn btn-h" onclick="showHint()">💡 Pista</button>
        </div>
        <div class="fb" id="fb_rs${pi}"></div>`;
    }
  }
  updProg();
}

// ═══════════════════════════════════════════════════════════════
// CHECKS
// ═══════════════════════════════════════════════════════════════
function normStr(s){
  return s.trim().toLowerCase()
    .replace(/\s+/g,'').replace(/−/g,'-').replace(/·/g,'*')
    .replace(/\^/g,'').replace(/\*/g,'')
    .replace(/x1\b/,'x').replace(/1x\b/,'x');
}
function normN(s){return parseFloat(s.trim().replace(/−/g,'-').replace(/\s/g,'').replace(',','.'));}

function checkS1(){
  const v=normStr(document.getElementById('inp_s1').value);
  const ok=normStr(ex.passos[0].tQ_norm)===v || v===normStr(ex.passos[0].termeQ);
  if(ok){
    setOk('inp_s1');
    showFb('fb_s1','ok',`✓ Correcte! ${ex.dividend.split(' ')[0]} ÷ ${ex.divisor.split(' ')[0]} = <strong>${ex.passos[0].termeQ}</strong>. Ara multiplica pel divisor sencer.`);
    showNext('fb_s1',2);
  } else {
    setErr('inp_s1');
    showFb('fb_s1','error',`✗ No és correcte. Divideix el terme líder del dividend entre el terme líder del divisor. Recorda: divideixes els coeficients i restes els exponents.`);
  }
}

function checkTQ(pi){
  const v=normStr(document.getElementById(`inp_tq${pi}`).value);
  const ok=v===normStr(ex.passos[pi].tQ_norm)||v===normStr(ex.passos[pi].termeQ);
  const id=`inp_tq${pi}`, fb=`fb_tq${pi}`;
  if(ok){
    setOk(id);
    showFb(fb,'ok',`✓ Perfecte! El terme del quocient és <strong>${ex.passos[pi].termeQ}</strong>.`);
    showNext(fb,step+1);
  } else {
    setErr(id);
    const residuA=pi===0?ex.dividend:ex.passos[pi-1].residu;
    showFb(fb,'error',`✗ No és correcte. Terme líder del residu: ${residuA.split(' ')[0]}. Divisor: ${ex.divisor.split(' ')[0]}. Divideix els coeficients i resta els exponents.`);
  }
}

function checkProd(pi){
  const pas=ex.passos[pi];
  const vals=pas.prod_norm.map((_,j)=>normStr(document.getElementById(`inp_pr${pi}_${j}`).value));
  const oks=vals.map((v,j)=>v===normStr(pas.prod_norm[j])||v===normStr(pas.prod_norm[j].replace('-','')));
  // Acceptem signes positius per simplificar
  const fullOk=oks.every(Boolean);
  oks.forEach((ok,j)=>{ if(ok) setOk(`inp_pr${pi}_${j}`); else setErr(`inp_pr${pi}_${j}`); });
  const fb=`fb_pr${pi}`;
  if(fullOk){
    showFb(fb,'ok',`✓ Molt bé! El producte és <strong>${pas.producte}</strong>.`);
    showNext(fb,step+1);
  } else {
    let msg='✗ Algun terme no és correcte. ';
    oks.forEach((ok,j)=>{ if(!ok) msg+=`Terme ${j+1}: ${pas.termeQ} × ${ex.divisor.split(/[+\-\s]/)[j]||'…'} = ? `; });
    showFb(fb,'error',msg);
  }
}

function checkRes(pi){
  const v=normStr(document.getElementById(`inp_rs${pi}`).value);
  const fb=`fb_rs${pi}`;
  // Acceptació flexible: comprovem que els coefs normalitzats hi siguin tots
  const expected=ex.passos[pi].res_norm;
  const ok=expected.every(t=>{
    const nt=normStr(t);
    return v.includes(nt)||v.includes(nt.replace('-',''))||
      (nt==='0'&&v==='0')||
      (expected.length===1&&v===nt);
  });
  if(ok){
    setOk(`inp_rs${pi}`);
    const isLast=pi===ex.passos.length-1;
    showFb(fb,'ok',`✓ ${isLast?'Excel·lent! La resta final és':'Bé!'} <strong>${ex.passos[pi].residu}</strong>.${isLast?' El grau de la resta és menor que el grau del divisor. ✓':' Continuem amb el pas següent.'}`);
    showNext(fb,step+1);
  } else {
    setErr(`inp_rs${pi}`);
    showFb(fb,'error',`✗ No és correcte. Posa el producte amb signe canviat (${ex.passos[pi].signe_canviat}) i suma columna a columna amb el residu anterior.`);
  }
}

function checkFinal(){
  const qv=normStr(document.getElementById('inp_qf').value);
  const rv=normStr(document.getElementById('inp_rf').value);
  // Comprovem que els coefs del quocient hi siguin
  const allQTerms=ex.passos.map(p=>normStr(p.tQ_norm));
  const qOk=allQTerms.every(t=>qv.includes(t)||qv.includes(t.replace('-',''))||qv.includes(t.replace(/[0-9]/g,'')));
  // Resta: comprovem el valor normalitzat
  const rOk=rv===normStr(ex.resta)||rv===normStr(ex.passos[ex.passos.length-1].residu);
  if(qOk&&rOk){
    showFb('fb_sf','ok',`✓ Excel·lent! Q(x) = ${ex.quocient} i R = ${ex.resta}. Divisió completada! 🎉`);
    setTimeout(()=>showFinal(),900);
  } else {
    let msg='✗ ';
    if(!qOk) msg+=`Revisa el quocient. Hauria de ser ${ex.quocient}. `;
    if(!rOk) msg+=`Revisa la resta. L'últim residu és ${ex.resta}.`;
    showFb('fb_sf','error',msg);
  }
}

// ═══════════════════════════════════════════════════════════════
// PISTES
// ═══════════════════════════════════════════════════════════════
function showHint(){
  const key=`s${step}`;
  hints[key]=(hints[key]||0);
  const idx=hints[key]%3; hints[key]++;

  let pi=getPasIdx(), ss=getSubStep();
  let hArr;

  if(step===1){
    hArr=[
      `El terme líder del dividend és ${ex.dividend.split(' ')[0]}. El del divisor és ${ex.divisor.split(' ')[0]}.`,
      `Divideix els coeficients: ${ex.dividend.split(' ')[0].match(/\d+/)?.[0]||1} ÷ ${ex.divisor.split(' ')[0].match(/\d+/)?.[0]||1} = ? I resta els exponents de x.`,
      `El primer terme del quocient és ${ex.passos[0].termeQ}.`
    ];
  } else if(step===totalSteps){
    hArr=[
      `El quocient és la suma de tots els termes que has calculat: ${ex.passos.map(p=>p.termeQ).join(', ')}.`,
      `Unifica els termes del quocient en un sol polinomi. La resta és l'últim residu.`,
      `Q(x) = ${ex.quocient} i R = ${ex.resta}.`
    ];
  } else if(ss===0){
    const rAnterior=pi===0?ex.dividend:ex.passos[pi-1].residu;
    hArr=[
      `Terme líder del residu actual: ${rAnterior.split(' ')[0]}. Terme líder del divisor: ${ex.divisor.split(' ')[0]}.`,
      `Divideix els coeficients i resta els exponents de x.`,
      `El terme del quocient d'aquest pas és ${ex.passos[pi].termeQ}.`
    ];
  } else if(ss===1){
    hArr=[
      `Multiplica ${ex.passos[pi].termeQ} per cada terme del divisor (${ex.divisor}) per separat.`,
      `Primer terme: ${ex.passos[pi].termeQ} × ${ex.divisor.split(' ')[0]} = ${ex.passos[pi].prod_norm[0]}. Continua amb la resta.`,
      `El producte complet és ${ex.passos[pi].producte}.`
    ];
  } else {
    hArr=[
      `Canvia el signe de tot el producte: ${ex.passos[pi].signe_canviat}. Ara suma columna a columna.`,
      `Suma cada coeficient de la mateixa potència de x.`,
      `El residu és ${ex.passos[pi].residu}.`
    ];
  }

  // Trobar el fb id correcte
  let fbId;
  if(step===1) fbId='fb_s1';
  else if(step===totalSteps) fbId='fb_sf';
  else if(ss===0) fbId=`fb_tq${pi}`;
  else if(ss===1) fbId=`fb_pr${pi}`;
  else fbId=`fb_rs${pi}`;

  showFb(fbId,'hint',`💡 ${hArr[idx<hArr.length?idx:hArr.length-1]}`+
    (hArr.length>1?`<br><small style="opacity:.6">Pista ${idx+1}/${hArr.length}</small>`:''));
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function setOk(id){const e=document.getElementById(id);if(e){e.classList.remove('error');e.classList.add('ok');}}
function setErr(id){
  const e=document.getElementById(id);
  if(e){e.classList.remove('ok');e.classList.add('error');
    e.style.animation='none';requestAnimationFrame(()=>{e.style.animation='';});}
}
function showFb(id,type,html){
  const e=document.getElementById(id);
  if(!e)return; e.className=`fb ${type}`; e.innerHTML=html; e.style.display='block';
}
function showNext(fbId,nextStep){
  const e=document.getElementById(fbId); if(!e)return;
  const btn=document.createElement('button');
  btn.className='btn btn-n'; btn.style.marginTop='.65rem';
  btn.innerHTML=nextStep<=totalSteps?`→ Pas ${nextStep}`:'🎉 Veure resultat';
  btn.onclick=()=>goToStep(nextStep);
  e.appendChild(document.createElement('br')); e.appendChild(btn);
}
function goToStep(n){
  step=n; updProg(); renderStep();
  document.getElementById('mainCard').scrollIntoView({behavior:'smooth',block:'start'});
}
function showFinal(){
  done[ex.label]=true; initSel();
  document.getElementById('mainCard').style.display='none';
  const fp=document.getElementById('finalPanel');
  fp.classList.add('show');
  document.getElementById('finalTitle').textContent=`Apartat ${ex.label}) completat! 🎉`;
  document.getElementById('resBox').innerHTML=`
    <div class="rl">Dividend: <span style="color:var(--cd)">${ex.dividend}</span></div>
    <div class="rl">Divisor: <span style="color:var(--accent2)">${ex.divisor}</span></div>
    <div class="rl" style="margin-top:.5rem">Quocient: <span style="color:var(--cq)">${ex.quocient}</span></div>
    <div class="rl">Resta: <span style="color:var(--cr)">${ex.resta}</span></div>`;
  fp.scrollIntoView({behavior:'smooth',block:'center'});
}

// CHAT
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatBox').classList.toggle('open',chatOpen);
  if(chatOpen&&!document.getElementById('chatMsgs').children.length)
    addTutor('Hola! Estic aquí per ajudar-te amb la divisió llarga. Quin dubte tens?');
  if(chatOpen) document.getElementById('chatInp').focus();
}
function addUser(t){const d=document.createElement('div');d.className='msg user';d.textContent=t;document.getElementById('chatMsgs').appendChild(d);scrollC();}
function addTutor(t){const d=document.createElement('div');d.className='msg tutor';d.innerHTML=t;document.getElementById('chatMsgs').appendChild(d);scrollC();}
function scrollC(){const m=document.getElementById('chatMsgs');m.scrollTop=m.scrollHeight;}
function showTyp(){const d=document.createElement('div');d.className='msg tutor';d.id='typ';
  d.innerHTML='<span class="ldots"><span>·</span><span>·</span><span>·</span></span>';
  document.getElementById('chatMsgs').appendChild(d);scrollC();return d;}
async function sendChat(){
  const inp=document.getElementById('chatInp'),txt=inp.value.trim();if(!txt)return;
  inp.value='';addUser(txt);const typ=showTyp();
  const sys=`Ets un tutor de matemàtiques de 3r ESO, simpàtic i pacient. Ajudes amb la divisió llarga de polinomis. ${ex.tutorCtx} Pas actual: ${step}/${totalSteps}. Respon en català, màxim 3 frases, guia sense donar la resposta directa.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:txt}]})});
    const data=await res.json(); typ.remove();
    addTutor(data.content?.[0]?.text||'Torna a intentar-ho!');
  }catch{
    typ.remove();
    addTutor(`Recorda: al pas actual has de ${step<=1?'identificar el terme líder i dividir-lo':step===totalSteps?'llegir el quocient i la resta de la taula':'multiplicar o calcular el residu'}. Prova el botó Pista!`);
  }
}
